# ============================================================
# CI Workflow — Telecom Subscription Service
# Trigger: every push and pull_request to any branch
# Jobs:
#   1. build-and-test  → compile + unit tests (Mockito only)
#   2. docker-build    → verify Docker image builds (no push)
# ============================================================

name: CI – Build & Test

# ── When to run ─────────────────────────────────────────────
on:
  push:
    branches: ["**"]          # every branch
  pull_request:
    branches: [main, develop]  # PR targeting main or develop

# ── Jobs ────────────────────────────────────────────────────
jobs:

  # ── Job 1: Compile + Unit Tests ───────────────────────────
  build-and-test:
    name: Build & Unit Test (Java 21)
    runs-on: ubuntu-latest   # GitHub-hosted runner, free for public repos

    steps:

      # Step 1: checkout source code onto the runner
      - name: Checkout source
        uses: actions/checkout@v4
        # actions/checkout: official GitHub action that runs `git clone`
        # @v4: pinned major version for stability

      # Step 2: install Java 21 (matches your pom.xml <java.version>21</java.version>)
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'   # Eclipse Temurin = same base image as your Dockerfile
          cache: 'maven'            # cache ~/.m2 between runs → faster builds

      # Step 3: compile the project and run ONLY unit tests (Mockito)
      #   -DskipITs           → skip classes matching *IT.java / *IntegrationTest.java
      #   -Dtest=!*Integration*  → belt-and-suspenders: exclude by name pattern too
      #   Reason: integration tests need MySQL + Redis + Kafka (not available in CI runner)
      - name: Build & run unit tests
        run: |
          mvn -B clean test \
            -DskipITs \
            -Dtest="!*IntegrationTest*" \
            --file pom.xml
        # -B: batch mode (no color, cleaner logs in CI)

      # Step 4: upload Surefire test reports as artifact (viewable in GitHub Actions UI)
      - name: Upload test report
        if: always()    # run even if tests fail, so you can see the report
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
          retention-days: 7

  # ── Job 2: Docker Build Check ─────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: build-and-test     # only run if job 1 passes

    steps:

      - name: Checkout source
        uses: actions/checkout@v4

      # Build the Java service image (no push — just verify Dockerfile is valid)
      - name: Build Java service Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false           # CI only: build but don't push to registry
          tags: telecom-subscription-service:ci-check

      # Build the Python sidecar image
      - name: Build Python sidecar Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./ai-advisor-sidecar
          file: ./ai-advisor-sidecar/Dockerfile
          push: false
          tags: telecom-ai-sidecar:ci-check
