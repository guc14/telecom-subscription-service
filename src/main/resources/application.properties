# --------------------------------------------------------
# Application Info
# --------------------------------------------------------
spring.application.name=telecom-subscription-service

# --------------------------------------------------------
# Default: H2 in-memory database (for easy run / tests)
# --------------------------------------------------------
spring.datasource.url=jdbc:h2:mem:telecomdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.open-in-view=false

# --------------------------------------------------------
# Redis Cache
# --------------------------------------------------------
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.cache.type=redis

# --------------------------------------------------------
# Kafka
# --------------------------------------------------------
spring.kafka.bootstrap-servers=localhost:9092

# Producer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
spring.kafka.producer.properties.enable.idempotence=true

# Consumer
spring.kafka.consumer.group-id=telecom-notification-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.guc.telecom.event

# --------------------------------------------------------
# Logging
# --------------------------------------------------------
logging.level.com.guc.telecom=INFO
logging.level.org.apache.kafka=WARN

# --------------------------------------------------------
# Spring AI — OpenAI (replaces manual RestTemplate approach)
#
# Provider portability: to switch LLM provider, change only this section.
#   OpenAI (default):    spring.ai.openai.api-key + spring.ai.openai.chat.options.*
#   Azure OpenAI:        spring.ai.azure.openai.api-key + endpoint (no code change)
#   Ollama (local/free): spring.ai.ollama.base-url (no API key needed)
#
# Why Spring AI over raw RestTemplate:
#   - No manual HTTP header construction or JSON casting
#   - Built-in retry (spring.ai.retry.*) and timeout configuration
#   - SimpleLoggerAdvisor logs token usage at DEBUG level automatically
# --------------------------------------------------------
spring.ai.openai.api-key=${OPENAI_API_KEY:}
spring.ai.openai.chat.options.model=gpt-4o-mini
spring.ai.openai.chat.options.max-tokens=120

# Retry on transient errors (rate limit, network blip) — max 2 attempts
spring.ai.retry.max-attempts=2
spring.ai.retry.on-http-codes=429,500,503

# DEBUG: logs full prompt + response + token usage (disable in production)
logging.level.org.springframework.ai.chat.client.advisor=DEBUG

# --------------------------------------------------------
# AI Advisor Sidecar (Python FastAPI)
# --------------------------------------------------------
ai.advisor.url=${AI_ADVISOR_URL:http://localhost:8000}
