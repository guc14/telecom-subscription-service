# --------------------------------------------------------
# Application Info
# --------------------------------------------------------
spring.application.name=telecom-subscription-service

# --------------------------------------------------------
# Default: H2 in-memory database (for easy run / tests)
# --------------------------------------------------------
spring.datasource.url=jdbc:h2:mem:telecomdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.open-in-view=false

# --------------------------------------------------------
# Redis Cache
# --------------------------------------------------------
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.cache.type=redis

# --------------------------------------------------------
# Kafka
# --------------------------------------------------------
spring.kafka.bootstrap-servers=localhost:9092

# Producer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
spring.kafka.producer.properties.enable.idempotence=true

# Consumer
spring.kafka.consumer.group-id=telecom-notification-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.guc.telecom.event

# --------------------------------------------------------
# Logging
# --------------------------------------------------------
logging.level.com.guc.telecom=INFO
logging.level.org.apache.kafka=WARN

# --------------------------------------------------------
# OpenAI API (AI-assisted plan description generation)
# --------------------------------------------------------
openai.api.key=${OPENAI_API_KEY:}

# --------------------------------------------------------
# AI Advisor Sidecar
# --------------------------------------------------------
ai.advisor.url=${AI_ADVISOR_URL:http://localhost:8000}
