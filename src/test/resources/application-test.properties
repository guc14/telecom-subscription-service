# ── Test profile ──────────────────────────────────────────────────────────────
# Used by @ActiveProfiles("test") in integration tests.
# H2 in-memory DB — no MySQL needed.
# Redis cache disabled — avoids needing a real Redis in CI.
# Kafka handled by @EmbeddedKafka in the test class.

spring.datasource.url=jdbc:h2:mem:telecomtestdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Disable Redis cache in tests to avoid connection errors
spring.cache.type=none

# Embedded Kafka port (matches @EmbeddedKafka brokerProperties)
spring.kafka.bootstrap-servers=localhost:9093
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.group-id=test-group

# Suppress noisy Kafka logs in test output
logging.level.org.apache.kafka=ERROR
logging.level.org.springframework.kafka=WARN
logging.level.com.guc.telecom=WARN
